services:
  rabbitmq:
    extends:
      file: ../agent-queue/docker-compose.yml
      service: rabbitmq
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: agent-cache
    hostname: agent-cache
    ports:
      - "6379:6379"
    volumes:
      - ../cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-dagster:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CONFIG_PATH=config.yaml
    depends_on:
      rabbitmq:
        condition: service_healthy
      cache:
        condition: service_healthy

volumes:
  redis_data:
