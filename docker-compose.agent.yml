services:
  rabbitmq:
    extends:
      file: ../agent-queue/docker-compose.yml
      service: rabbitmq
    networks:
      - dagster-network
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  cache:
    image: redis:7-alpine
    container_name: dagster-cache
    hostname: cache
    ports:
      - "6379:6379"
    volumes:
      - ../cache/redis.conf:/usr/local/etc/redis/redis.conf:ro
      - redis_data:/data
    command: redis-server /usr/local/etc/redis/redis.conf
    networks:
      - dagster-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  agent-dagster:
    build:
      context: .
      dockerfile: Dockerfile.agent
    container_name: agent-dagster
    ports:
      - "8000:8000"
    volumes:
      - ./config.yaml:/app/config.yaml
      - pipelines:/opt/dagster/app/pipelines
    environment:
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - CONFIG_PATH=config.yaml
    networks:
      - dagster-network
    depends_on:
      rabbitmq:
        condition: service_healthy
      cache:
        condition: service_healthy
      dagster-webserver:
        condition: service_started

volumes:
  redis_data:
  pipelines:

networks:
  dagster-network:
    external: true
    name: dagster-network
